name: WNBA Quant Daily Pipeline

on:
  schedule:
    # GitHub Actions 使用 UTC 时间。
    # UTC 00:00 对应北京时间 08:00
    - cron: '0 0 * * *'
  # 添加 workflow_dispatch 允许在 GitHub 网页上手动点击运行按钮进行测试
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 设置 Python 环境 (Set up Python 3.10)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 执行主调度程序 (Run main.py)
        env:
          # 从 GitHub Secrets 注入环境变量
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          API_BASKETBALL_KEY: ${{ secrets.API_BASKETBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          python main.py
